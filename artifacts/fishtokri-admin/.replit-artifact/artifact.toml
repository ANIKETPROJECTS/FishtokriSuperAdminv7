kind = "web"
previewPath = "/"
title = "FishTokri Admin"
version = "1.0.0"
id = "artifacts/fishtokri-admin"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 5000

[services.development]
run = "bash /home/runner/workspace/scripts/dev.sh"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fishtokri-admin", "run", "build" ]
publicDir = "artifacts/fishtokri-admin/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "5000"
BASE_PATH = "/"
